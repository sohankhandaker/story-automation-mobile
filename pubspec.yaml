name: story_automation
description: SELISE Elicitation & Requirement Agent
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  dio: ^5.7.0
  flutter_riverpod: ^2.5.1
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.2
  intl: ^0.19.0
  url_launcher: ^6.3.0
  flutter_markdown: ^0.7.3
  google_fonts: ^6.2.1
  gap: ^3.0.1
  flutter_svg: ^2.0.10+1
  speech_to_text: ^7.0.0
  permission_handler: ^11.3.1
  image_picker: ^1.1.2
  file_picker: ^8.1.0
  mime: ^1.0.5
  share_plus: ^12.0.2
  path_provider: ^2.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_icon.jpeg"
  min_sdk_android: 21
  adaptive_icon_background: "assets/images/app_icon.jpeg"
  adaptive_icon_foreground: "assets/images/app_icon_fg.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
